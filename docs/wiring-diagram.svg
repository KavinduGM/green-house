<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" font-family="Inter, Arial, sans-serif">
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}
    .title{font-size:26px;font-weight:700;fill:#14532d}
    .sub{font-size:14px;fill:#64748b}
    .chip{font-size:18px;font-weight:700;fill:#0f172a}
    .pin{font-size:13px;font-family:monospace;fill:#0f172a}
    .lab{font-size:13px;fill:#334155}
    .note{font-size:13px;fill:#475569}
    .w3{stroke:#dc2626;stroke-width:2.5;fill:none}      /* 3.3V */
    .w5{stroke:#f59e0b;stroke-width:2.5;fill:none}      /* 5V   */
    .wg{stroke:#111827;stroke-width:2.5;fill:none}      /* GND  */
    .ws{stroke:#2563eb;stroke-width:2.5;fill:none}      /* DHT data */
    .wa{stroke:#16a34a;stroke-width:2.5;fill:none}      /* soil analog */
    .wc{stroke:#9333ea;stroke-width:2.5;fill:none}      /* relay control */
    .w12{stroke:#b91c1c;stroke-width:3.5;fill:none}     /* 12V */
    text{dominant-baseline:middle}
  </style>

  <rect width="1200" height="860" fill="#ffffff"/>
  <text x="40" y="40" class="title">Greenhouse ESP32 — Wiring Diagram</text>
  <text x="40" y="66" class="sub">NodeMCU ESP32 · DHT22 · capacitive soil sensor · 3-channel relay → 12V pump / light / fan</text>

  <!-- ============ ESP32 ============ -->
  <rect x="470" y="250" width="240" height="390" class="box" rx="10"/>
  <text x="590" y="278" class="chip" text-anchor="middle">ESP32</text>
  <text x="590" y="298" class="sub" text-anchor="middle">NodeMCU 30-pin</text>
  <!-- left pins -->
  <g>
    <circle cx="470" cy="340" r="5" fill="#dc2626"/><text x="486" y="340" class="pin">3V3</text>
    <circle cx="470" cy="380" r="5" fill="#111827"/><text x="486" y="380" class="pin">GND</text>
    <circle cx="470" cy="450" r="5" fill="#2563eb"/><text x="486" y="450" class="pin">GPIO4</text>
    <circle cx="470" cy="560" r="5" fill="#16a34a"/><text x="486" y="560" class="pin">GPIO34</text>
  </g>
  <!-- right pins -->
  <g text-anchor="end">
    <circle cx="710" cy="330" r="5" fill="#9333ea"/><text x="694" y="330" class="pin">GPIO26</text>
    <circle cx="710" cy="370" r="5" fill="#9333ea"/><text x="694" y="370" class="pin">GPIO27</text>
    <circle cx="710" cy="410" r="5" fill="#9333ea"/><text x="694" y="410" class="pin">GPIO25</text>
    <circle cx="710" cy="490" r="5" fill="#f59e0b"/><text x="694" y="490" class="pin">5V/VIN</text>
    <circle cx="710" cy="530" r="5" fill="#111827"/><text x="694" y="530" class="pin">GND</text>
  </g>

  <!-- ============ DHT22 ============ -->
  <rect x="70" y="280" width="180" height="130" class="box" rx="10"/>
  <text x="160" y="306" class="chip" text-anchor="middle">DHT22</text>
  <text x="160" y="326" class="sub" text-anchor="middle">temp + humidity</text>
  <g text-anchor="start">
    <circle cx="250" cy="340" r="5" fill="#dc2626"/><text x="214" y="340" class="pin" text-anchor="end">VCC</text>
    <circle cx="250" cy="370" r="5" fill="#2563eb"/><text x="210" y="370" class="pin" text-anchor="end">DATA</text>
    <circle cx="250" cy="400" r="5" fill="#111827"/><text x="214" y="400" class="pin" text-anchor="end">GND</text>
  </g>
  <!-- pull-up resistor between DATA and VCC -->
  <rect x="300" y="352" width="26" height="12" fill="none" stroke="#92400e" stroke-width="1.5"/>
  <text x="313" y="345" class="note" text-anchor="middle" font-size="11">10kΩ</text>
  <path d="M300 358 H290 V340" stroke="#dc2626" stroke-width="1.5" fill="none"/>
  <path d="M326 358 H336 V370" stroke="#2563eb" stroke-width="1.5" fill="none"/>

  <!-- ============ Soil sensor ============ -->
  <rect x="70" y="490" width="180" height="130" class="box" rx="10"/>
  <text x="160" y="516" class="chip" text-anchor="middle">Soil sensor</text>
  <text x="160" y="536" class="sub" text-anchor="middle">capacitive (analog)</text>
  <g>
    <circle cx="250" cy="550" r="5" fill="#dc2626"/><text x="214" y="550" class="pin" text-anchor="end">VCC</text>
    <circle cx="250" cy="580" r="5" fill="#16a34a"/><text x="210" y="580" class="pin" text-anchor="end">AOUT</text>
    <circle cx="250" cy="610" r="5" fill="#111827"/><text x="214" y="610" class="pin" text-anchor="end">GND</text>
  </g>

  <!-- ===== sensor wires to ESP32 ===== -->
  <!-- DHT VCC -> 3V3 ; soil VCC -> 3V3 (shared) -->
  <path class="w3" d="M250 340 H470"/>
  <path class="w3" d="M250 550 H280 V340"/>
  <circle cx="280" cy="340" r="3.5" fill="#dc2626"/>
  <!-- DHT DATA -> GPIO4 -->
  <path class="ws" d="M250 370 H360 V450 H470"/>
  <!-- soil AOUT -> GPIO34 -->
  <path class="wa" d="M250 580 H400 V560 H470"/>
  <!-- DHT GND -> GND ; soil GND -> GND (shared) -->
  <path class="wg" d="M250 400 H340 V380 H470"/>
  <path class="wg" d="M250 610 H320 V380"/>
  <circle cx="340" cy="380" r="3.5" fill="#111827"/>
  <circle cx="320" cy="380" r="3.5" fill="#111827"/>

  <!-- ============ Relay module ============ -->
  <rect x="790" y="280" width="330" height="250" class="box" rx="10"/>
  <text x="955" y="306" class="chip" text-anchor="middle">3-Channel Relay</text>
  <text x="955" y="326" class="sub" text-anchor="middle">active-LOW</text>
  <!-- control pins (left) -->
  <g>
    <circle cx="790" cy="330" r="5" fill="#9333ea"/><text x="806" y="330" class="pin">IN1 · pump</text>
    <circle cx="790" cy="370" r="5" fill="#9333ea"/><text x="806" y="370" class="pin">IN2 · light</text>
    <circle cx="790" cy="410" r="5" fill="#9333ea"/><text x="806" y="410" class="pin">IN3 · fan</text>
    <circle cx="790" cy="470" r="5" fill="#f59e0b"/><text x="806" y="470" class="pin">VCC (5V)</text>
    <circle cx="790" cy="505" r="5" fill="#111827"/><text x="806" y="505" class="pin">GND</text>
  </g>
  <!-- output terminals (bottom): COM/NO per channel -->
  <g text-anchor="middle">
    <circle cx="850" cy="530" r="5" fill="#b91c1c"/><text x="850" y="552" class="pin">COM1</text>
    <circle cx="890" cy="530" r="5" fill="#0f172a"/><text x="890" y="552" class="pin">NO1</text>
    <circle cx="960" cy="530" r="5" fill="#b91c1c"/><text x="960" y="552" class="pin">COM2</text>
    <circle cx="1000" cy="530" r="5" fill="#0f172a"/><text x="1000" y="552" class="pin">NO2</text>
    <circle cx="1070" cy="530" r="5" fill="#b91c1c"/><text x="1070" y="552" class="pin">COM3</text>
    <circle cx="1110" cy="530" r="5" fill="#0f172a"/><text x="1110" y="552" class="pin">NO3</text>
  </g>

  <!-- ESP32 -> relay control wires -->
  <path class="wc" d="M710 330 H790"/>
  <path class="wc" d="M710 370 H790"/>
  <path class="wc" d="M710 410 H790"/>
  <path class="w5" d="M710 490 H750 V470 H790"/>
  <path class="wg" d="M710 530 H760 V505 H790"/>

  <!-- ============ 12V power + loads ============ -->
  <!-- +12V rail (red) and GND rail (black) -->
  <path class="w12" d="M270 640 H1110"/>
  <text x="320" y="628" class="note" fill="#b91c1c">+12V</text>
  <path class="wg" d="M280 800 H1110"/>
  <text x="320" y="788" class="note">GND (12V)</text>

  <!-- 12V PSU -->
  <rect x="70" y="660" width="170" height="110" class="box" rx="10"/>
  <text x="155" y="700" class="chip" text-anchor="middle">12V PSU</text>
  <text x="155" y="722" class="sub" text-anchor="middle">(fused)</text>
  <path class="w12" d="M240 690 H270 V640"/>
  <path class="wg" d="M240 745 H280 V800"/>
  <circle cx="270" cy="640" r="3.5" fill="#b91c1c"/>
  <circle cx="280" cy="800" r="3.5" fill="#111827"/>

  <!-- loads -->
  <g text-anchor="middle">
    <rect x="800" y="675" width="100" height="60" class="box" rx="10"/><text x="850" y="705" class="lab">Pump 12V</text>
    <rect x="910" y="675" width="100" height="60" class="box" rx="10"/><text x="960" y="705" class="lab">Light 12V</text>
    <rect x="1020" y="675" width="100" height="60" class="box" rx="10"/><text x="1070" y="705" class="lab">Fan 12V</text>
  </g>

  <!-- COM -> +12V rail (junction dots), NO -> load, load -> GND rail -->
  <!-- ch1 pump -->
  <path class="w12" d="M850 535 V640"/><circle cx="850" cy="640" r="3.5" fill="#b91c1c"/>
  <path class="wg"  d="M890 535 V660 H850 V675"/>
  <path class="wg"  d="M850 735 V800"/><circle cx="850" cy="800" r="3.5" fill="#111827"/>
  <!-- ch2 light -->
  <path class="w12" d="M960 535 V640"/><circle cx="960" cy="640" r="3.5" fill="#b91c1c"/>
  <path class="wg"  d="M1000 535 V660 H960 V675"/>
  <path class="wg"  d="M960 735 V800"/><circle cx="960" cy="800" r="3.5" fill="#111827"/>
  <!-- ch3 fan -->
  <path class="w12" d="M1070 535 V640"/><circle cx="1070" cy="640" r="3.5" fill="#b91c1c"/>
  <path class="wg"  d="M1110 535 V655 H1070 V675"/>
  <path class="wg"  d="M1070 735 V800"/><circle cx="1070" cy="800" r="3.5" fill="#111827"/>

  <!-- ============ legend ============ -->
  <g transform="translate(940,85)">
    <rect x="0" y="0" width="230" height="170" fill="#f8fafc" stroke="#cbd5e1" rx="8"/>
    <text x="14" y="22" class="chip" font-size="14">Legend</text>
    <line x1="14" y1="46" x2="44" y2="46" class="w3"/><text x="52" y="46" class="note">3.3V (sensor power)</text>
    <line x1="14" y1="68" x2="44" y2="68" class="w5"/><text x="52" y="68" class="note">5V (relay power)</text>
    <line x1="14" y1="90" x2="44" y2="90" class="wg"/><text x="52" y="90" class="note">GND (common)</text>
    <line x1="14" y1="112" x2="44" y2="112" class="ws"/><text x="52" y="112" class="note">DHT22 data → GPIO4</text>
    <line x1="14" y1="134" x2="44" y2="134" class="wa"/><text x="52" y="134" class="note">Soil analog → GPIO34</text>
    <line x1="14" y1="156" x2="44" y2="156" class="w12"/><text x="52" y="156" class="note">12V (switched loads)</text>
  </g>

  <!-- notes -->
  <g>
    <text x="300" y="832" class="note" font-weight="700" fill="#b91c1c">Wires crossing WITHOUT a dot are NOT connected. Each COM → +12V rail, NO → load+, load– → 12V GND rail.</text>
    <text x="300" y="852" class="note">Notes: • Relay control side (VCC/IN/GND) shares GND with the ESP32.  • DHT22 DATA has a 10kΩ pull-up to VCC.</text>
  </g>
</svg>
